<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Mon premier formulaire</title>
	<link rel="icon" type="pic/x-icone" href="pic/form.png">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6; /* espace vertical entre les lignes*/
            color: #333333;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Titres */
        h1 {
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }

        h2 {
            color: #3498db;
            margin-top: 30px;
        }

		/* Style des Fieldsets */
        fieldset {
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            background-color: #fff;
        }

        legend {
            font-weight: bold;
            color: #2c3e50;
            padding: 0 10px;
            font-size: 1.1rem;
        }

        /* Style des div contenus dans fieldset */
        fieldset div {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
        }

        label {
            width: 160px; /* Aligne les champs verticalement */
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="date"],
        input[type="phone"] {
            padding: 8px 12px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            flex: 1; /* Le champ prend l'espace restant */
            max-width: 300px;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        button[type="submit"] {
            background-color: #3498db;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s ease;
        }

        button[type="submit"]:hover {
            background-color: #2980b9;
        }

    </style>
</head>
<body>
	<h1>Formulaire d'inscription</h1>
	<main>
		<h2>Votre compte configuré en 2 minutes !</h2>
		<form action="/formulaire.html" method="GET" enctype="text/plain">
			<fieldset>
				<legend>État civil</legend>
				<div>
					<label for="lastname">Nom&nbsp;:</label>
					<input type="text" id="lastname" name="lastname" required />
				</div>
				<div>
					<label for="firstname">Prénom&nbsp;:</label>
					<input type="text" id="firstname" name="firstname" required />
				</div>
				<div>
					<label for="birthdate">Date de naissance&nbsp;:</label>
					<input type="date" id="birthdate" name="birthdate" />
				<div>
			</fieldset>
			<fieldset>
				<legend>Informations de contact</legend>
				<div>
					<label for="mail">E-mail&nbsp;:</label>
					<input type="email" id="mail" name="mail" required />
				</div>
				<div>
					<label for="phone">Téléphone&nbsp;:</label>
					<input type="tel" name="phone" id="tel" placeholder="0123456789" maxlength="10" required />
				</div>
			</fieldset>
			<fieldset>
				<div>
					<input type="checkbox" id="agreement" name="egreement" />
					J'accepte les&nbsp;
					<a href="conditions.html" target="_blank">conditions d'utilsiation</a>
				</div>
				<div>
					<button type="submit">S'inscrire</button>
				</div>
			</fieldset>
			</ul>
		</form>
	</main>
</body>
</html>
